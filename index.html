<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Game Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
  <h1>TwiVT Hosted</h1>
  <nav>
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="about.html">About</a>
    </div>
    <div class="nav-right" id="user-nav">
      <!-- JS will fill this -->
    </div>
  </nav>
</header>

  <div class="container">
    <h2>Welcome!</h2>
    <p>This is skibidi</p>
  </div>
  <footer>
    <p>&copy; 2025 TwiVT</p>
  </footer>

  <!-- 🔽 Add this just before </body> -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCSDU9rtFzForMO2pz2TD3pNzb8mOBmisg",
      authDomain: "twivthosted.firebaseapp.com",
      projectId: "twivthosted",
      storageBucket: "twivthosted.firebasestorage.app",
      messagingSenderId: "367803204431",
      appId: "1:367803204431:web:6f8a02c133e07c033abb3a",
      measurementId: "G-M156JBWQJS"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Fill nav bar
    const userNav = document.getElementById("user-nav");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Logged in
        const name = user.displayName || "User";
        const pfp = user.photoURL || "default-avatar.png";

        userNav.innerHTML = `
          <div class="user-info">
            <img src="${pfp}" alt="Profile" class="pfp">
            <span>${name}</span>
            <button id="logout-btn">Logout</button>
          </div>
        `;

        document.getElementById("logout-btn").addEventListener("click", async () => {
          await signOut(auth);
        });

      } else {
        // Logged out
        userNav.innerHTML = `<a href="login.html">Login</a>`;
      }
    });
  </script>
</body>
</html>
