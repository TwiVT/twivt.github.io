<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwiVT Hosted Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Games</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <div class="container">
    <h2>All Games</h2>
    <div class="game-card">
      <img src="placeholderCover.jpg" alt="Game Cover">
      <h3>Hi</h3>
      <p>How are you? :3</p>
      <button>Peekaboo</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 TwiVT Hosted</p>
  </footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCSDU9rtFzForMO2pz2TD3pNzb8mOBmisg",
    authDomain: "twivthosted.firebaseapp.com",
    projectId: "twivthosted",
    storageBucket: "twivthosted.firebasestorage.app",
    messagingSenderId: "367803204431",
    appId: "1:367803204431:web:6f8a02c133e07c033abb3a",
    measurementId: "G-M156JBWQJS"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const analytics = getAnalytics(app);

  // Make goToGame global so inline onclick works
  window.goToGame = function(id) {
    window.location.href = `game.html?id=${id}`;
  }

  async function loadGames() {
    const container = document.querySelector('.container');
    const gamesCol = collection(db, 'games');
    const gameSnapshot = await getDocs(gamesCol);

    container.innerHTML = '<h2>All Games</h2>'; // clear existing cards

    gameSnapshot.forEach(doc => {
      const game = doc.data();
      const card = document.createElement('div');
      card.className = 'game-card';
      card.innerHTML = `
        <img src="${game.cover || 'default-cover.jpg'}" alt="${game.name || 'Unnamed Game'}">
        <h3>${game.name || 'Unnamed Game'}</h3>
        <p>${game.description || 'No description available.'}</p>
        <p>Rating: ${game.rating !== undefined ? game.rating : 'N/A'}</p>
        <button onclick="goToGame('${doc.id}')">View Details</button>
      `;
      container.appendChild(card);
    });
  }

  loadGames();
</script>

</body>
</html>
