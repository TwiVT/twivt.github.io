<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwiVT Hosted Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TwiVT Hosted</h1>
  <nav>
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="about.html">About</a>
    </div>
    <div class="nav-right" id="user-nav">
      <!-- JS will fill this -->
    </div>
  </nav>
</header>


  <main class="container">
    <h2>All Games</h2>
  </main>

  <footer>
    <p>&copy; 2025 TwiVT Hosted</p>
  </footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-analytics.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCSDU9rtFzForMO2pz2TD3pNzb8mOBmisg",
      authDomain: "twivthosted.firebaseapp.com",
      projectId: "twivthosted",
      storageBucket: "twivthosted.firebasestorage.app",
      messagingSenderId: "367803204431",
      appId: "1:367803204431:web:6f8a02c133e07c033abb3a",
      measurementId: "G-M156JBWQJS"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Fill nav bar
    const userNav = document.getElementById("user-nav");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Logged in
        const name = user.displayName || "User";
        const pfp = user.photoURL || "default-avatar.png";

        userNav.innerHTML = `
          <div class="user-info">
            <img src="${pfp}" alt="Profile" class="pfp">
            <span>${name}</span>
            <button id="logout-btn">Logout</button>
          </div>
        `;

        document.getElementById("logout-btn").addEventListener("click", async () => {
          await signOut(auth);
        });

      } else {
        // Logged out
        userNav.innerHTML = `<a href="login.html">Login</a>`;
      }
    });

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCSDU9rtFzForMO2pz2TD3pNzb8mOBmisg",
  authDomain: "twivthosted.firebaseapp.com",
  projectId: "twivthosted",
  storageBucket: "twivthosted.firebasestorage.app",
  messagingSenderId: "367803204431",
  appId: "1:367803204431:web:6f8a02c133e07c033abb3a",
  measurementId: "G-M156JBWQJS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const analytics = getAnalytics(app);

// Function to navigate to game page
function goToGame(id) {
  window.location.href = `game.html?id=${id}`;
}

// Load games from Firestore
async function loadGames() {
  const container = document.querySelector('.container');
  const gamesCol = collection(db, 'games');
  const gameSnapshot = await getDocs(gamesCol);

  // Clear container, keep the heading
  container.innerHTML = '<h2>All Games</h2>';

  gameSnapshot.forEach(doc => {
    const game = doc.data();

    // Create card
    const card = document.createElement('div');
    card.className = 'game-card';

    // Add content
    const img = document.createElement('img');
    img.src = game.cover || 'default-cover.jpg';
    img.alt = game.name || 'Unnamed Game';

    const title = document.createElement('h3');
    title.textContent = game.name || 'Unnamed Game';

    const desc = document.createElement('p');
    desc.textContent = game.description || 'No description available.';

    const rating = document.createElement('p');
    rating.textContent = `Rating: ${game.rating !== undefined ? game.rating : 'N/A'}`;

    const button = document.createElement('button');
    button.textContent = 'View Details';
    button.addEventListener('click', () => goToGame(doc.id));

    // Append elements
    card.append(img, title, desc, rating, button);
    container.appendChild(card);
  });
}

// Initialize
loadGames();
</script>

</body>
</html>
